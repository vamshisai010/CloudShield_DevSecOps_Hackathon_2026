apiVersion: apps/v1
kind: Deployment
metadata:
  name: train-ticket-deployment
  labels:
    app: train-ticket

spec:
  replicas: 2

  selector:
    matchLabels:
      app: train-ticket

  template:
    metadata:
      labels:
        app: train-ticket

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: train-ticket
        image: 846697434284.dkr.ecr.ap-south-1.amazonaws.com/train-ticket:latest

        ports:
        - containerPort: 8080

        imagePullPolicy: Always
