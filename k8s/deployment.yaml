apiVersion: apps/v1
kind: Deployment
metadata:
  name: train-ticket-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: train-ticket
  template:
    metadata:
      labels:
        app: train-ticket
    spec:
      containers:
      - name: train-ticket
        image: 846697434284.dkr.ecr.ap-south-1.amazonaws.com/train-ticket-reservation:latest
        ports:
        - containerPort: 8080
