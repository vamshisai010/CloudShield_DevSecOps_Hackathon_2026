name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 846697434284.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: train-ticket
  IMAGE_TAG: latest

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: Build with Maven
      run: mvn clean package

    - name: SonarQube Scan
      run: |
        mvn sonar:sonar \
        -Dsonar.projectKey=train-ticket \
        -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
        -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin $ECR_REGISTRY

    - name: Build Docker Image
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    - name: Push Image to ECR
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy -y

    - name: Scan Docker Image with Trivy
      run: |
        trivy image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Deploy to K3s Server with ECR Secret and CRT
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |

          # Clone repo if not exists
          if [ ! -d "CloudShield_DevSecOps_Hackathon_2026" ]; then
            git clone https://github.com/vamshisai010/CloudShield_DevSecOps_Hackathon_2026.git
          fi
          cd CloudShield_DevSecOps_Hackathon_2026

          # Optional: Install CA certificate if needed
          sudo cp certs/mycluster.crt /usr/local/share/ca-certificates/
          sudo update-ca-certificates

          # Login to ECR
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 846697434284.dkr.ecr.ap-south-1.amazonaws.com

          # Pull latest image
          docker pull 846697434284.dkr.ecr.ap-south-1.amazonaws.com/train-ticket:latest

          # Recreate ECR secret for Kubernetes
          sudo k3s kubectl delete secret ecr-secret --ignore-not-found
          sudo k3s kubectl create secret docker-registry ecr-secret \
            --docker-server=846697434284.dkr.ecr.ap-south-1.amazonaws.com \
            --docker-username=AWS \
            --docker-password=$(aws ecr get-login-password --region ap-south-1) \
            --namespace default

          # Apply Kubernetes manifests
          sudo k3s kubectl apply -f k8s/deployment.yaml
          sudo k3s kubectl apply -f k8s/service.yaml

          # Make sure the deployment pulls the image with the secret
          sudo k3s kubectl patch deployment train-ticket-deployment \
            -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ecr-secret"}]}}}}'

          # Restart deployment to pick up latest image
          sudo k3s kubectl rollout restart deployment train-ticket-deployment
